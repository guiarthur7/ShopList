<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopList - Accueil</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Bienvenue sur ShopList</h1>
        <p>Gérez vos listes de courses facilement</p>
        
        <div class="buttons">
            <div class="buttons" id="auth-buttons">
                <a href="login.html" class="btn">Se connecter</a>
                <a href="register.html" class="btn">S'inscrire</a>
            </div>
            <div id="user-info"></div>
        </div>

        <div id="creation">
        </div>
        <div id="pagination">
            <div class="search">
                <input type="text" id="recherche" placeholder="Rechercher...">
                <button id="validerRecherche">Valider</button>
                <button id="last-page">Précédente</button>
                <button id="next-page">Suivante</button>
            </div>
        </div>

        <div id="listeProduits"></div>
    </div>
    <script src="js/index.js"></script>
</body>
</html>
